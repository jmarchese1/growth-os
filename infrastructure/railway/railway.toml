[build]
builder = "DOCKERFILE"

[[services]]
name = "api-gateway"
dockerfilePath = "apps/api/Dockerfile"
startCommand = "node apps/api/dist/index.js"
port = 3000
healthcheckPath = "/health"

[[services]]
name = "crm-core"
dockerfilePath = "services/crm-core/Dockerfile"
startCommand = "node services/crm-core/dist/index.js"
port = 3001
healthcheckPath = "/health"

[[services]]
name = "voice-agent"
dockerfilePath = "services/voice-agent/Dockerfile"
startCommand = "node services/voice-agent/dist/index.js"
port = 3002
